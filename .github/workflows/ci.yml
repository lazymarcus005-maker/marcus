name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: harness
          POSTGRES_PASSWORD: harness
          POSTGRES_DB: harness_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      rabbitmq:
        image: rabbitmq:3.13-management-alpine
        env:
          RABBITMQ_DEFAULT_USER: harness
          RABBITMQ_DEFAULT_PASS: harness
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      HARNESS_DATABASE_URL: postgresql+asyncpg://harness:harness@localhost:5432/harness_test
      HARNESS_TEST_DATABASE_URL: postgresql+asyncpg://harness:harness@localhost:5432/harness_test
      HARNESS_RABBITMQ_URL: amqp://harness:harness@localhost:5672/
      HARNESS_TEST_RABBITMQ_URL: amqp://harness:harness@localhost:5672/

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.8.17"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy harness

      - name: Alembic upgrade head
        run: uv run alembic upgrade head

      - name: Pytest
        run: uv run pytest --cov=harness --cov-report=term-missing
