services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: harness
      POSTGRES_PASSWORD: harness
      POSTGRES_DB: harness
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U harness -d harness"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: harness
      RABBITMQ_DEFAULT_PASS: harness
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      target: api
    command: ["alembic", "upgrade", "head"]
    environment:
      HARNESS_DATABASE_URL: postgresql+asyncpg://harness:harness@postgres:5432/harness
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      target: api
    ports:
      - "8000:8000"
    environment:
      HARNESS_DATABASE_URL: postgresql+asyncpg://harness:harness@postgres:5432/harness
      HARNESS_REDIS_URL: redis://redis:6379/0
      HARNESS_RABBITMQ_URL: amqp://harness:harness@rabbitmq:5672/
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 5s
      timeout: 5s
      retries: 10
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  worker:
    build:
      context: .
      target: worker
    environment:
      HARNESS_DATABASE_URL: postgresql+asyncpg://harness:harness@postgres:5432/harness
      HARNESS_REDIS_URL: redis://redis:6379/0
      HARNESS_RABBITMQ_URL: amqp://harness:harness@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  postgres-data:
